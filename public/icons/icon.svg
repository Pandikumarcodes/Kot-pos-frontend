<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#4A5F52"/>

  <!-- Plate circle -->
  <circle cx="256" cy="256" r="160" fill="#E6F2EB" opacity="0.15"/>
  <circle cx="256" cy="256" r="130" fill="#E6F2EB" opacity="0.1"/>

  <!-- Fork (left) -->
  <g fill="#E6F2EB">
    <!-- Fork handle -->
    <rect x="190" y="290" width="18" height="100" rx="9"/>
    <!-- Fork tines -->
    <rect x="184" y="130" width="6" height="80" rx="3"/>
    <rect x="197" y="130" width="6" height="80" rx="3"/>
    <rect x="210" y="130" width="6" height="80" rx="3"/>
    <!-- Fork neck -->
    <rect x="184" y="205" width="32" height="8" rx="4"/>
    <rect x="190" y="208" width="18" height="82" rx="0"/>
  </g>

  <!-- Knife (right) -->
  <g fill="#E6F2EB">
    <!-- Knife handle -->
    <rect x="304" y="290" width="18" height="100" rx="9"/>
    <!-- Knife blade -->
    <path d="M304 130 Q322 150 322 210 L304 210 Z" rx="3"/>
    <!-- Knife neck -->
    <rect x="304" y="208" width="18" height="82" rx="0"/>
  </g>

  <!-- K letter in center -->
  <text
    x="256"
    y="288"
    font-family="Arial, sans-serif"
    font-weight="900"
    font-size="100"
    fill="#E6F2EB"
    text-anchor="middle"
    dominant-baseline="middle"
  >K</text>
</svg>