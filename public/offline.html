<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KOT POS — Offline</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #e6f2eb;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .icon {
        width: 80px;
        height: 80px;
        background: #4a5f52;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
      }
      .icon span {
        font-size: 36px;
      }
      h1 {
        font-size: 24px;
        font-weight: 700;
        color: #2d3a33;
        margin-bottom: 8px;
      }
      p {
        font-size: 15px;
        color: #7e8681;
        margin-bottom: 32px;
        line-height: 1.5;
        max-width: 300px;
      }
      button {
        background: #4a5f52;
        color: white;
        border: none;
        padding: 14px 32px;
        border-radius: 14px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        background: #2d3a33;
      }
      .tip {
        margin-top: 24px;
        font-size: 12px;
        color: #7e8681;
      }
    </style>
  </head>
  <body>
    <div class="icon"><span>🍽️</span></div>
    <h1>You're offline</h1>
    <p>
      KOT POS needs an internet connection to load orders and sync with the
      kitchen. Please check your WiFi or mobile data.
    </p>
    <button onclick="window.location.reload()">Try Again</button>
    <p class="tip">Pages you've already visited may still be available.</p>
  </body>
</html>
